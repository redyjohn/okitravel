<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="description" content="2026 沖繩親子自駕旅行（11大4嬰）行程與注意事項">
  <meta name="theme-color" content="#023e8a">
  <title>沖繩親子自駕旅行｜互動行程</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header class="hero">
    <h1>2026 沖繩親子自駕旅行</h1>
    <p class="dates">2026.06.27 – 06.30</p>
    <span class="badge">11 大 4 嬰 · 4 台自駕 · 點擊地址即可導航</span>
  </header>

  <nav class="main-nav" aria-label="主要導覽">
    <button class="active" data-panel="panel-itinerary">📅 每日行程</button>
    <button data-panel="panel-notices">📋 注意事項</button>
    <button data-panel="panel-notices" data-notice="souvenirs">🛍 伴手禮</button>
  </nav>

  <div class="day-tabs-bar visible" id="day-tabs-bar">
    <div id="day-tabs-sentinel" class="day-tabs-sentinel" aria-hidden="true"></div>
    <div class="day-tabs-placeholder" id="day-tabs-placeholder"></div>
    <div class="day-tabs-sticky" id="day-tabs-sticky">
      <div id="day-tabs" class="day-tabs" role="tablist" aria-label="選擇日期"></div>
    </div>
  </div>

  <main>
    <section id="panel-itinerary" class="panel active" aria-label="每日行程">
      <div class="quick-links">
        <a class="btn-link btn-ext" href="https://services.digital.go.jp/zh-cmn-hant/visit-japan-web/" target="_blank" rel="noopener">🔗 Visit Japan Web</a>
        <a class="btn-link btn-maps" href="https://www.google.com/maps/search/?api=1&amp;query=%E9%82%A3%E9%9C%B8%E6%A9%9F%E5%A0%B4" target="_blank" rel="noopener">📍 那霸機場</a>
        <a class="btn-link btn-maps" href="https://www.google.com/maps/search/?api=1&amp;query=5201314%20Okinawa%20Rental%20Car" target="_blank" rel="noopener">🚗 租車公司</a>
      </div>
      <div id="itinerary-content"></div>
    </section>

    <section id="panel-notices" class="panel" aria-label="注意事項">
      <div id="notice-tabs" class="notice-tabs" role="tablist"></div>
      <div id="notice-content" class="notice-content"></div>
    </section>
  </main>

  <footer>
    <p>2026 沖繩親子自駕旅行 · 11 大 4 嬰 · 4 台自駕</p>
  </footer>

  <div id="lightbox" class="lightbox" role="dialog" aria-label="圖片放大檢視">
    <img src="" alt="放大檢視">
  </div>

  <script src="data.js?v=4"></script>
  <script src="app.js?v=4"></script>

</body>
</html>
